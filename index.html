<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <script>
    !function(f,b,e,v,n,t,s){
        if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];
        t=b.createElement(e);t.async=!0;t.src=v;
        s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '735253462874774');

    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=735253462874774&ev=PageView&noscript=1"/>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #ff0000;
            object-fit: cover;
            object-position: center;
            margin-bottom: 25px;
            box-shadow: 0px 0px 30px rgba(255, 0, 0, 0.5);
        }
        .btn-telegram {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .btn-telegram:hover {
            background-color: #00aaff;
        }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/8zPw7cfH/IMG-3647.png" alt="Maya" class="profile-pic">
    
    <button class="btn-telegram" onclick="irParaTelegram()">CLIQUE PARA ME VER!</button>

    <script>
        // Funções de Cookie
        function getCookie(name) {
            const value = "; " + document.cookie;
            const parts = value.split("; " + name + "=");
            if (parts.length === 2) return parts.pop().split(";").shift();
            return null;
        }

        function setCookie(name, value, days = 365) {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days*24*60*60*1000));
            document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/`;
        }

        // Variáveis de Rastreio
        const urlParams = new URLSearchParams(window.location.search);
        let uid = urlParams.get('uid');
        const fbclid = urlParams.get('fbclid') || '';

        if (!uid) {
            uid = 'track_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            urlParams.set('uid', uid);
            window.history.replaceState({}, '', `${window.location.pathname}?${urlParams.toString()}`);
        }

        let fbp = getCookie('_fbp');
        if (!fbp) {
            fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 1000000000);
            setCookie('_fbp', fbp);
        }

        let fbc = getCookie('_fbc');
        if (!fbc && fbclid) {
            const ts = Math.floor(Date.now() / 1000);
            fbc = 'fb.1.' + ts + '.' + fbclid;
            setCookie('_fbc', fbc);
        }

        const serverUrl = "https://pixel-meta-maya-apexvips-production.up.railway.app/apex-tracking";
        const trackingUrl = `${serverUrl}?uid=${uid}&fbp=${encodeURIComponent(fbp)}&fbc=${encodeURIComponent(fbc || '')}&fbclid=${encodeURIComponent(fbclid)}`;

        // TIRO 1: Tracking inicial ao carregar a página
        fetch(trackingUrl, { mode: 'no-cors' })
            .then(() => console.log('✅ Rastreamento inicial plantado:', uid))
            .catch(err => console.error('❌ Erro no rastreio inicial:', err));

        // TIRO 2: Clique do Botão
        // ✅ FIX: await no fetch + delay de 600ms antes do redirect
        // Garante que os dados chegam no Redis ANTES do /start ser processado
                // TIRO 2: Clique do Botão
        async function irParaTelegram() {
            if (typeof fbq !== "undefined") fbq('track', 'Contact');

            console.log('📤 Enviando tracking final para UID:', uid);
            try {
                await fetch(trackingUrl, { 
                    method: 'GET', 
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                console.log('✅ Tracking final enviado com sucesso');
                // Aguarda 3,5 segundos para garantir que o servidor grave no Redis
                await new Promise(resolve => setTimeout(resolve, 1000));
                console.log('⏱️ Delay finalizado, redirecionando...');
            } catch (err) {
                console.warn("⚠️ Erro no sync final:", err);
            }

            window.location.href = `https://t.me/Mayaoficial_bot?start=${uid}`;
        }
    </script>

</body>
</html>
